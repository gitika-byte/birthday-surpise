<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<style>

body{
  margin:0;
  font-family: Georgia, "Times New Roman", Times, serif;
  text-align:center;
  overflow-x:hidden;

  background: linear-gradient(
    135deg,
    #cde7ff,
    #ffd6e7,
    #dff7e2,
    #fff3c4,
    #e6d9ff
  );

  background-size: 400% 400%;
  animation: pastelFlow 18s ease infinite;
}

@keyframes pastelFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.screen{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  height:100vh;
}

.hidden{ display:none; }

button{
  padding:12px 26px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:#ff6f91;
  color:white;
  font-family: Georgia, "Times New Roman", Times, serif;
}

h1{
  font-size:54px;
  letter-spacing:1px;
}

h2{
  font-weight:normal;
}

#mainMessage{
  font-size:22px;
  max-width:700px;
  margin:10px auto 20px;
  line-height:1.6;
}

.countdown{
  font-size:90px;
  font-weight:bold;
}

.balloon{
  position:fixed;
  bottom:-120px;
  width:40px;
  height:50px;
  border-radius:50%;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{ transform:translateY(0);}
  to{ transform:translateY(-120vh);}
}

.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

.slideshow{
  position:relative;
  max-width:720px;
  margin:30px auto;
}

.slide{
  position:absolute;
  width:100%;
  opacity:0;
  transition:opacity 1.5s;
}

.slide img{
  width:100%;
  border-radius:16px;
}

.slide.active{
  opacity:1;
  position:relative;
}

.secret-box{
  margin-top:20px;
  padding:22px;
  background:white;
  border-radius:14px;
  max-width:620px;
  margin-left:auto;
  margin-right:auto;
}

#surprise{
  padding:30px;
  backdrop-filter: blur(6px);
}

</style>
</head>

<body>

<!-- Start screen -->
<div id="start" class="screen">
  <h2>You got a surprise gift 🎁</h2>
  <button onclick="startQuestions()">Open</button>
</div>

<!-- Questions -->
<div id="questions" class="screen hidden">
  <h2 id="questionText"></h2>
  <div>
    <button onclick="yesAnswer()">Yes</button>
    <button onclick="noAnswer()">No</button>
  </div>
</div>

<!-- Countdown -->
<div id="countdownScreen" class="screen hidden">
  <div id="countdown" class="countdown">3</div>
</div>

<!-- Surprise -->
<div id="surprise" class="hidden">

  <h1>🎉 Happy Birthday! 🎂</h1>
  <p id="mainMessage">
    Write your birthday message here.
  </p>

  <button onclick="toggleSecret()">Open Secret Message 🔒</button>

  <div id="secretMessage" class="secret-box hidden">
    Your secret message goes here 💌
  </div>

  <!-- Slideshow -->
  <div class="slideshow">
    <div class="slide active"><img src="PHOTO_URL_1"></div>
    <div class="slide"><img src="PHOTO_URL_2"></div>
    <div class="slide"><img src="PHOTO_URL_3"></div>
    <div class="slide"><img src="PHOTO_URL_4"></div>
    <div class="slide"><img src="PHOTO_URL_5"></div>
  </div>

</div>

<!-- Music -->
<audio id="music" loop>
  <source src="PASTE_MUSIC_URL_HERE">
</audio>

<script>

let step = 0;

const retryMessages = [
  "Are you sure?",
  "You might wanna try again 😅",
  "Think carefully...",
  "That answer seems suspicious 🤔"
];

let retryIndex = 0;

function startQuestions(){
  document.getElementById("start").classList.add("hidden");
  document.getElementById("questions").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  const text = document.getElementById("questionText");

  if(step === 0)
    text.textContent = "Do you wanna open the surprise gift?";
  else if(step === 1)
    text.textContent = "First, do you love Gitika?";
  else if(step === 2)
    text.textContent = "Aww, she loves you too! So, are you ready for your surprise?";
}

function yesAnswer(){
  if(step === 0){
    step = 1;
    showQuestion();
  }
  else if(step === 1){
    step = 2;
    showQuestion();
  }
  else if(step === 2){
    startCountdown();
  }
}

function noAnswer(){
  if(step === 0){
    document.getElementById("questionText").textContent =
      "You need to press Yes to open the gift 🎁";
  }
  else if(step === 1){
    document.getElementById("questionText").textContent =
      retryMessages[retryIndex % retryMessages.length];
    retryIndex++;
  }
  else if(step === 2){
    document.getElementById("questionText").textContent =
      "Come on 😄 press Yes!";
  }
}

let count = 3;

function startCountdown(){
  document.getElementById("questions").classList.add("hidden");
  document.getElementById("countdownScreen").classList.remove("hidden");

  let timer = setInterval(()=>{
    count--;
    document.getElementById("countdown").textContent = count;

    if(count === 0){
      clearInterval(timer);
      openSurprise();
    }
  },1000);
}

function openSurprise(){
  document.getElementById("countdownScreen").classList.add("hidden");
  document.getElementById("surprise").classList.remove("hidden");

  startMusic();
  launchConfetti();
  createBalloons();
  startSlideshow();
}

function startMusic(){
  let music = document.getElementById("music");
  music.play().catch(()=>{});
}

function launchConfetti(){
  for(let i=0;i<150;i++){
    let confetti=document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left=Math.random()*100+"vw";
    confetti.style.background =
      "hsl("+Math.random()*360+",100%,50%)";
    confetti.style.animationDuration =
      (Math.random()*3+2)+"s";
    document.body.appendChild(confetti);
  }
}

function createBalloons(){
  for(let i=0;i<25;i++){
    let balloon=document.createElement("div");
    balloon.classList.add("balloon");
    balloon.style.left=Math.random()*100+"vw";
    balloon.style.background =
      "hsl("+Math.random()*360+",70%,70%)";
    balloon.style.animationDuration =
      (Math.random()*10+10)+"s";
    document.body.appendChild(balloon);
  }
}

function toggleSecret(){
  document.getElementById("secretMessage")
  .classList.toggle("hidden");
}

let slideIndex = 0;

function startSlideshow(){
  const slides = document.querySelectorAll(".slide");

  setInterval(()=>{
    slides[slideIndex].classList.remove("active");
    slideIndex = (slideIndex + 1) % slides.length;
    slides[slideIndex].classList.add("active");
  },3500);
}

</script>

</body>
</html>
